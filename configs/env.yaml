# env.yaml
# Physical parameters for the EV Client Environment and Grid

# Battery and Physics [cite: 13-17]
battery_capacity: 60.0    # C_i in kWh
eta: 0.95                 # Charging efficiency (e.g., 95%)
dt: 1.0                   # Simulation timestep in hours
max_power: 11.0           # u_bar (kW)

# SOC Constraints and Targets
soc_min: 0.0              # Minimum allowable State of Charge
soc_max: 1.0              # Maximum allowable State of Charge
soc_target: 0.9           # Target SOC requirement at departure

# CC-CV Charging Profile [cite: 22]
alpha_constraint: 0.05    # P_max = max_power * (1 - alpha_constraint * SOC)
